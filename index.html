<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101820" />
    <title>H5 惯性导航</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel header">
        <div>
          <p class="eyebrow">iOS / Android H5 INS</p>
          <h1>惯性导航实验台</h1>
        </div>
        <div class="status" id="status">未启动</div>
      </section>

      <section class="panel controls">
        <button id="startBtn" type="button">启动传感器</button>
        <button id="calibrateBtn" type="button">静止校准</button>
        <button id="resetBtn" type="button">重置轨迹</button>
      </section>

      <section class="readout">
        <article class="metric">
          <span>位置 X</span>
          <strong id="posX">0.000 m</strong>
        </article>
        <article class="metric">
          <span>位置 Y</span>
          <strong id="posY">0.000 m</strong>
        </article>
        <article class="metric">
          <span>位置 Z</span>
          <strong id="posZ">0.000 m</strong>
        </article>
        <article class="metric">
          <span>速度</span>
          <strong id="speed">0.000 m/s</strong>
        </article>
      </section>

      <section class="panel">
        <canvas id="trajectory" width="900" height="520" aria-label="轨迹画布"></canvas>
      </section>

      <section class="panel diagnostics">
        <div>
          <span>姿态</span>
          <b id="attitude">roll 0.0°, pitch 0.0°, yaw 0.0°</b>
        </div>
        <div>
          <span>采样</span>
          <b id="sampleRate">0 Hz</b>
        </div>
        <div>
          <span>静止检测</span>
          <b id="stationary">false</b>
        </div>
        <div>
          <span>质量</span>
          <b id="quality">等待数据</b>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
